name: Atualizar Dados BCB

on:
  schedule:
    - cron: '30 17 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Gerar HTML
        run: python generate.py

      - name: Publicar se houve mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/cambio_data.json
          git diff --staged --quiet || git commit -m "Atualizar dados BCB $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
